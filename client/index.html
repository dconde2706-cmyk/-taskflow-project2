<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <title>Taskflow Daniel Conde</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 min-h-screen flex items-center justify-center transition-colors duration-300">

<main class="w-full max-w-4xl p-4">

  <div class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-lg transition">


    <header class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800 dark:text-white">
        Taskflow Daniel Conde
      </h1>

      <button id="theme-toggle"
        aria-label="Cambiar modo oscuro"
        class="bg-gray-200 dark:bg-gray-700 text-black dark:text-white px-3 py-1 rounded hover:scale-105 transition">
        🌙
      </button>
    </header>

    <div class="flex flex-col md:flex-row gap-6">

    
      <section class="flex-1">


        <form id="task-form" class="flex gap-2 mb-4">
          <label for="task-input" class="sr-only">Nueva tarea</label>

          <input
            type="text"
            id="task-input"
            placeholder="Añadir tarea..."
            required
            class="flex-1 px-3 py-2 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 dark:bg-gray-700 dark:border-gray-600 dark:text-white transition"
          >

          <button
            type="submit"
            class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded transition">
            Añadir
          </button>
        </form>

        
        <input
          type="text"
          id="search-input"
          placeholder="Buscar tarea..."
          class="w-full px-3 py-2 mb-4 rounded border border-gray-300 focus:ring-2 focus:ring-blue-400 dark:bg-gray-700 dark:border-gray-600 dark:text-white transition"
        >

       
        <div class="flex gap-2 mb-4">
          <button data-filter="all" class="px-3 py-1 bg-gray-200 dark:bg-gray-700 rounded">
            Todas
          </button>
          <button data-filter="pending" class="px-3 py-1 bg-gray-200 dark:bg-gray-700 rounded">
            Pendientes
          </button>
          <button data-filter="completed" class="px-3 py-1 bg-gray-200 dark:bg-gray-700 rounded">
            Completadas
          </button>
        </div>

       
        <ul id="task-list" class="space-y-2"></ul>

       
        <div class="flex gap-2 mt-4">
          <button id="complete-all"
            class="text-sm bg-green-500 text-white px-3 py-1 rounded">
            Completar todas
          </button>

          <button id="clear-completed"
            class="text-sm bg-red-500 text-white px-3 py-1 rounded">
            Borrar completadas
          </button>
        </div>

      </section>

    
      <aside class="w-full md:w-64 bg-gray-50 dark:bg-gray-700 p-4 rounded">
        <h2 class="font-bold mb-3 text-gray-800 dark:text-white">
          Estadísticas
        </h2>

        <p>Total: <span id="total">0</span></p>
        <p>Completadas: <span id="completed">0</span></p>
        <p>Pendientes: <span id="pending">0</span></p>
      </aside>

    </div>
  </div>

</main>

<script src="app.js"></script>

</body>
</html>
